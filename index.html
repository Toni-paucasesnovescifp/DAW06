<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban Scrum App</title>
    <link rel="stylesheet" href="css/estils.css">
</head>
<body>
<header>
    <h1>Gestor de Tasques Kanban</h1>
</header>

<main>
    <!-- Botó per obrir el formulari -->
    <div style="text-align: center; margin-bottom: 25px;">
        <button id="btn-obrir-formulari" onclick="obrirFormulari()">+ Nova Tasca</button>
    </div>

    <!-- Formulari (Modal) -->
    <section id="controls">
        <div id="formulari-tasca">
            <h2 id="form-title">Nova Tasca</h2>
            <form id="task-form">
                <input type="hidden" id="edit-id">

                <div class="fila-formulari">
                    <div class="camp">
                        <label for="task-title">Títol:</label>
                        <input type="text" id="task-title" required placeholder="Què cal fer?">
                    </div>
                    <div class="camp">
                        <label for="task-desc">Descripció:</label>
                        <input type="text" id="task-desc" placeholder="Detalls curts...">
                    </div>
                </div>

                <div class="fila-formulari">
                    <div class="camp">
                        <label for="task-date">Venciment:</label>
                        <input type="date" id="task-date" required>
                    </div>
                    <div class="camp">
                        <label for="task-priority">Prioritat:</label>
                        <select id="task-priority">
                            <option value="baixa">Baixa</option>
                            <option value="mitjana" selected>Mitjana</option>
                            <option value="alta">Alta</option>
                        </select>
                    </div>
                    <div class="camp">
                        <label for="task-status">Estat:</label>
                        <select id="task-status">
                            <option value="perFer">Per fer</option>
                            <option value="enCurs">En curs</option>
                            <option value="fet">Fet</option>
                        </select>
                    </div>
                </div>

                <div class="botons-formulari">
                    <button type="button" id="btn-cancel">Cancel·lar</button>
                    <button type="submit" id="btn-save">Afegir Tasca</button>
                </div>
            </form>
        </div>
    </section>

    <!-- Requadre gros que engloba les 3 columnes -->
    <div id="tauler-container">
        <section id="tauler">
            <article class="columna" id="per-fer">
                <h2>Per fer</h2>
                <div class="contenidor-tasques"></div>
            </article>

            <article class="columna" id="en-curs">
                <h2>En procés</h2>
                <div class="contenidor-tasques"></div>
            </article>

            <article class="columna" id="fet">
                <h2>Fet</h2>
                <div class="contenidor-tasques"></div>
            </article>
        </section>
    </div>
</main>

<script src="js/script.js"></script>
</body>
</html>
